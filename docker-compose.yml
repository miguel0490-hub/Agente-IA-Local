services:
  app:
    build:
      context: .
      args:
        PIP_TRUSTED_HOSTS: ${PIP_TRUSTED_HOSTS:-}
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://superagente:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/superagente
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=128m,noexec,nosuid
    volumes:
      - ./data:/app/data
      - ./generated_images:/app/generated_images
      - ./logs:/app/logs

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: superagente
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: superagente
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superagente"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--save",
        "",
        "--appendonly",
        "no",
        "--maxmemory",
        "128mb",
        "--maxmemory-policy",
        "allkeys-lru",
        "--requirepass",
        "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}",
      ]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  worker:
    build:
      context: .
      args:
        PIP_TRUSTED_HOSTS: ${PIP_TRUSTED_HOSTS:-}
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://superagente:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/superagente
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
    command: ["sh", "-c", "rq worker -u \"$REDIS_URL\" \"${RQ_QUEUE_NAME:-superagente}\""]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, redis; redis.from_url(os.environ['REDIS_URL']).ping()\"",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=128m,noexec,nosuid
    volumes:
      - ./data:/app/data
      - ./generated_images:/app/generated_images
      - ./logs:/app/logs

  monitoring:
    build:
      context: .
      args:
        PIP_TRUSTED_HOSTS: ${PIP_TRUSTED_HOSTS:-}
    env_file:
      - .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_INSECURE=${OTEL_EXPORTER_OTLP_INSECURE:-false}
    command: ["uvicorn", "src.monitoring.api:app", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - monitoring
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_PLUGINS_PLUGIN_ADMIN_ENABLED: "false"
      GF_PLUGINS_PUBLIC_KEY_RETRIEVAL_DISABLED: "true"
      GF_PLUGINS_ANGULAR_SUPPORT_ENABLED: "false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://127.0.0.1:3000/api/health | grep -Eq '\"database\"[[:space:]]*:[[:space:]]*\"ok\"'",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./src/observability/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  gateway:
    build:
      context: .
      args:
        PIP_TRUSTED_HOSTS: ${PIP_TRUSTED_HOSTS:-}
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://superagente:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/superagente
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_INSECURE=${OTEL_EXPORTER_OTLP_INSECURE:-false}
    command: ["uvicorn", "src.gateway.app:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    volumes:
      - ./logs:/app/logs

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
      - gateway
      - monitoring
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
