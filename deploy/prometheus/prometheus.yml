global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: superagente
    metrics_path: /metrics
    static_configs:
      - targets:
          - monitoring:8080
        labels:
          environment: production

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
