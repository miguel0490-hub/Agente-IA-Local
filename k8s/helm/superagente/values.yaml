# ============================================================
# SuperAgente IA — Helm Values (defaults / staging-like)
# Override per-environment via k8s/environments/*.yaml
# ============================================================

global:
  namespace: superagente
  environment: staging

# -- Container image --------------------------------------------------------
image:
  repository: ghcr.io/superagente-ia/superagente
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent
  pullSecrets: []

# -- Service Account --------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

# -- Pod Security ------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# -- Streamlit App -----------------------------------------------------------
app:
  replicaCount: 2
  port: 8501
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  startupProbe:
    httpGet:
      path: /_stcore/health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 30
    timeoutSeconds: 3
  livenessProbe:
    httpGet:
      path: /_stcore/health
      port: http
    periodSeconds: 15
    failureThreshold: 3
    timeoutSeconds: 3
  readinessProbe:
    httpGet:
      path: /_stcore/health
      port: http
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 3
  terminationGracePeriodSeconds: 45
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: app
            topologyKey: kubernetes.io/hostname
  nodeSelector: {}
  tolerations: []
  extraEnv: []

# -- RQ Worker ---------------------------------------------------------------
worker:
  replicaCount: 2
  command:
    - rq
    - worker
    - -u
    - "$(REDIS_URL)"
    - superagente
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 500m
      memory: 768Mi
  terminationGracePeriodSeconds: 120
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: worker
            topologyKey: kubernetes.io/hostname
  nodeSelector: {}
  tolerations: []
  extraEnv: []

# -- Monitoring API ----------------------------------------------------------
monitoring:
  enabled: true
  replicaCount: 1
  port: 8080
  command:
    - uvicorn
    - src.monitoring.api:app
    - --host
    - "0.0.0.0"
    - --port
    - "8080"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  livenessProbe:
    httpGet:
      path: /health
      port: http
    periodSeconds: 15
    failureThreshold: 3
    timeoutSeconds: 3
  readinessProbe:
    httpGet:
      path: /health
      port: http
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 3
  nodeSelector: {}
  tolerations: []

# -- Ingress -----------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
  hosts:
    - host: superagente.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: superagente-tls
      hosts:
        - superagente.example.com

# -- Autoscaling -------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

# -- Pod Disruption Budget ---------------------------------------------------
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# -- Network Policies -------------------------------------------------------
networkPolicy:
  enabled: true

# -- Config (non-secret) ----------------------------------------------------
config:
  ENVIRONMENT: staging
  UPLOAD_POLICY: strict
  MAX_IMAGE_MB: "15"
  MAX_VIDEO_MB: "100"
  MAX_AUDIO_MB: "100"
  MAX_DOC_MB: "25"
  RATE_LIMIT_CHAT_LIMIT: "10"
  RATE_LIMIT_CHAT_WINDOW: "60"
  RATE_LIMIT_UPLOADS_LIMIT: "20"
  RATE_LIMIT_UPLOADS_WINDOW: "300"
  RATE_LIMIT_TOOLS_LIMIT: "30"
  RATE_LIMIT_TOOLS_WINDOW: "300"
  RATE_LIMIT_LOGIN_LIMIT: "8"
  RATE_LIMIT_LOGIN_WINDOW: "300"
  LOGIN_REQUIRE_REDIS: "1"
  ENABLE_ASYNC_TASKS: "1"
  RQ_QUEUE_NAME: superagente
  GEMINI_MAX_TOKENS: "8192"
  GEMINI_TEMPERATURE: "0.2"
  GROQ_MODEL: llama-3.3-70b-versatile
  GROQ_FALLBACK_MODEL: llama-3.3-70b-versatile
  SENTRY_TRACES_SAMPLE_RATE: "0.15"

# -- Secrets (base64-encoded at deploy time) ---------------------------------
secrets:
  APP_SECRET_KEY: ""
  DATABASE_URL: ""
  REDIS_URL: ""
  POSTGRES_PASSWORD: ""
  GEMINI_API_KEY: ""
  GROQ_API_KEY: ""
  OPENROUTER_API_KEY: ""
  OPENAI_API_KEY: ""
  STABILITY_API_KEY: ""
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SENTRY_DSN: ""

# -- External services (for Network Policies) --------------------------------
externalServices:
  postgres:
    host: postgres
    port: 5432
  redis:
    host: redis
    port: 6379
