apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "superagente.fullname" . }}-config
  namespace: {{ include "superagente.namespace" . }}
  labels:
    {{- include "superagente.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
