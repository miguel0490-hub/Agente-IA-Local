{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "superagente.fullname" . }}-gateway
  namespace: {{ include "superagente.namespace" . }}
  labels:
    {{- include "superagente.componentLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      {{- include "superagente.componentSelectorLabels" (dict "ctx" . "component" "gateway") | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "superagente.componentLabels" (dict "ctx" . "component" "gateway") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "superagente.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- include "superagente.podSecurityContext" . | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.gateway.terminationGracePeriodSeconds }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with .Values.gateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "superagente.componentSelectorLabels" (dict "ctx" . "component" "gateway") | nindent 14 }}
      containers:
        - name: gateway
          image: {{ include "superagente.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- include "superagente.containerSecurityContext" . | nindent 12 }}
          command:
            {{- toYaml .Values.gateway.command | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "superagente.fullname" . }}-config
            - secretRef:
                name: {{ include "superagente.fullname" . }}-secrets
          {{- with .Values.gateway.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.gateway.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.gateway.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-logs
              mountPath: /app/logs
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: app-logs
          emptyDir:
            sizeLimit: 256Mi
{{- end }}
