{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "superagente.fullname" . }}-gateway
  namespace: {{ include "superagente.namespace" . }}
  labels:
    {{- include "superagente.componentLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.gateway.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "superagente.componentSelectorLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
{{- end }}
