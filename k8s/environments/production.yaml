# ============================================================
# SuperAgente IA — Production Environment Overrides
# Usage: helm upgrade --install superagente ./k8s/helm/superagente \
#          -f k8s/environments/production.yaml -n superagente
# ============================================================

global:
  namespace: superagente
  environment: production

image:
  pullPolicy: IfNotPresent

app:
  replicaCount: 3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  terminationGracePeriodSeconds: 60
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: app
          topologyKey: kubernetes.io/hostname
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: app
            topologyKey: topology.kubernetes.io/zone

worker:
  replicaCount: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  terminationGracePeriodSeconds: 180
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: worker
          topologyKey: kubernetes.io/hostname

monitoring:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300

podDisruptionBudget:
  enabled: true
  minAvailable: 2

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/rate-limit: "50"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
  hosts:
    - host: superagente.example.com
  tls:
    - secretName: superagente-prod-tls
      hosts:
        - superagente.example.com

config:
  ENVIRONMENT: production
  UPLOAD_POLICY: strict
  MAX_IMAGE_MB: "15"
  MAX_VIDEO_MB: "100"
  MAX_AUDIO_MB: "100"
  MAX_DOC_MB: "25"
  RATE_LIMIT_CHAT_LIMIT: "10"
  RATE_LIMIT_CHAT_WINDOW: "60"
  RATE_LIMIT_UPLOADS_LIMIT: "20"
  RATE_LIMIT_UPLOADS_WINDOW: "300"
  RATE_LIMIT_TOOLS_LIMIT: "30"
  RATE_LIMIT_TOOLS_WINDOW: "300"
  RATE_LIMIT_LOGIN_LIMIT: "8"
  RATE_LIMIT_LOGIN_WINDOW: "300"
  LOGIN_REQUIRE_REDIS: "1"
  ENABLE_ASYNC_TASKS: "1"
  RQ_QUEUE_NAME: superagente
  SENTRY_TRACES_SAMPLE_RATE: "0.15"

networkPolicy:
  enabled: true
